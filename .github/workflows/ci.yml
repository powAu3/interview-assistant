name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # sounddevice / faster-whisper / mss need system audio/display libs;
          # skip them in CI — they are runtime-only and not needed for unit tests.
          grep -vE '^(sounddevice|faster-whisper|mss|pymupdf)' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install pytest httpx

      - name: Lint — syntax check
        run: python -m py_compile main.py

      - name: Run unit tests
        run: |
          python -m pytest tests/test_api_contracts.py tests/test_wave1_backend_concurrency.py -q --tb=short

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
