name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect what changed ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  # ── Backend ──────────────────────────────────────────────
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # faster-whisper needs large model downloads; skip in CI.
          grep -vE '^faster-whisper' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install pytest httpx ruff

      - name: Lint — ruff
        run: ruff check .

      - name: Lint — syntax check
        run: python -m py_compile main.py api/assist/pipeline.py api/common/router.py

      - name: Run unit tests
        run: |
          python -m pytest tests/test_api_contracts.py tests/test_wave1_backend_concurrency.py tests/test_session_integration.py tests/test_assist_asr_interrupt.py tests/test_preflight_real_audio.py tests/test_prompt_polish.py tests/test_bench_prompt.py tests/test_router_p0.py tests/test_pipeline_p0.py tests/test_practice_flow.py tests/test_resume_optimizer.py -q --tb=short

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error

  # ── Playwright E2E (mocked backend, no live API needed) ──
  e2e-playwright:
    needs: [changes, frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build frontend (preview server needs dist/)
        run: npm run build

      - name: Run Playwright functional tests (skip @visual)
        run: npx playwright test --config=playwright.config.mjs --grep-invert "@visual"
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 7
          if-no-files-found: ignore

  # ── Visual regression (pixel-diff snapshots) ─────────────
  # Baselines live under frontend/e2e/__screenshots__/ . When intentional
  # UI changes break this job, trigger the `update-visual-snapshots`
  # workflow on the feature branch to regenerate them.
  e2e-visual:
    needs: [changes, frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run visual regression
        run: npx playwright test --config=playwright.config.mjs --grep "@visual"
        env:
          CI: "true"

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
          if-no-files-found: ignore

  # ── End-to-end smoke (real backend boot + API contracts) ─
  e2e-smoke:
    needs: [changes, backend, frontend]
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          grep -vE '^faster-whisper' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run end-to-end smoke
        run: python scripts/e2e_test.py

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-logs
          path: |
            log/
            backend/data/
          retention-days: 3
          if-no-files-found: ignore

  # ── Aggregate gate so PR can require a single status check ──
  # All required jobs must succeed (or be skipped via paths-filter).
  # When this gate fails on visual diff, regenerate baselines on the
  # branch via the `update-visual-snapshots` workflow.
  ci-gate:
    needs: [backend, frontend, e2e-playwright, e2e-smoke, e2e-visual]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs succeeded or were skipped
        run: |
          ok=true
          for r in "${{ needs.backend.result }}" \
                   "${{ needs.frontend.result }}" \
                   "${{ needs.e2e-playwright.result }}" \
                   "${{ needs.e2e-smoke.result }}" \
                   "${{ needs.e2e-visual.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "Job result: $r"; ok=false ;;
            esac
          done
          $ok || { echo "One or more required jobs failed"; exit 1; }
          echo "All required jobs passed (or were skipped)."
