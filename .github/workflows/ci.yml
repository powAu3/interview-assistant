name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # faster-whisper needs large model downloads; skip in CI.
          grep -vE '^faster-whisper' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install pytest httpx

      - name: Lint — syntax check
        run: python -m py_compile main.py api/assist/pipeline.py api/common/router.py

      - name: Run unit tests
        run: |
          python -m pytest tests/test_api_contracts.py tests/test_wave1_backend_concurrency.py tests/test_session_integration.py tests/test_assist_asr_interrupt.py tests/test_preflight_real_audio.py -q --tb=short

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
