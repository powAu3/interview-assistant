name: update-visual-snapshots

# Manually triggered workflow that regenerates Playwright screenshot
# baselines on the same Linux runner CI uses, then opens a PR with the
# new images. Use this when intentional UI changes break the
# visual-regression check on a feature PR.

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to base the snapshot PR on"
        required: false
        default: "main"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Update snapshots
        working-directory: frontend
        run: npm run test:e2e:update-snapshots

      - name: Open PR with updated snapshots
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-visual-snapshots-${{ github.run_number }}
          base: ${{ github.event.inputs.base_branch }}
          commit-message: "chore(e2e): update Playwright visual snapshots"
          title: "chore(e2e): update visual regression snapshots"
          body: |
            Auto-generated by `update-visual-snapshots` workflow run #${{ github.run_number }}.

            Regenerated visual baselines from `${{ github.event.inputs.base_branch }}` on Ubuntu runner.

            Review the diff carefully:
            - If the UI changes are intentional, merge this PR.
            - If unexpected pixels changed, **do not merge** — investigate first.
          add-paths: |
            frontend/e2e/__screenshots__/**
          delete-branch: true
