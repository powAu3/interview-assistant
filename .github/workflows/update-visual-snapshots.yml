name: update-visual-snapshots

# Manually triggered workflow that regenerates Playwright screenshot
# baselines on the same Linux runner CI uses, then pushes them to a
# fresh branch. Open a PR for that branch via the GitHub UI link in the
# job summary.
#
# (We deliberately avoid auto-creating the PR so we don't depend on the
# repo-level "Allow GitHub Actions to create and approve pull requests"
# setting being enabled.)

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to base the snapshot push on"
        required: false
        default: "main"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Update snapshots
        working-directory: frontend
        run: npm run test:e2e:update-snapshots

      - name: Push snapshot branch
        id: push
        env:
          BASE: ${{ github.event.inputs.base_branch }}
          RUN: ${{ github.run_number }}
        run: |
          BRANCH="chore/visual-snapshots-${RUN}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add frontend/e2e/__screenshots__
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to push."
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(e2e): update Playwright visual snapshots (run #${RUN})"
          git push origin "$BRANCH"
          PR_URL="${{ github.server_url }}/${{ github.repository }}/compare/${BASE}...${BRANCH}?quick_pull=1&title=chore(e2e):%20update%20visual%20regression%20snapshots&body=Regenerated%20on%20Ubuntu%20runner%20from%20%60${BASE}%60%20by%20update-visual-snapshots%20run%20%23${RUN}."
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL"  >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: steps.push.outputs.branch != ''
        run: |
          {
            echo "## Visual snapshots updated";
            echo "";
            echo "Pushed: \`${{ steps.push.outputs.branch }}\`";
            echo "";
            echo "[Open Pull Request](${{ steps.push.outputs.pr_url }})";
          } >> "$GITHUB_STEP_SUMMARY"
